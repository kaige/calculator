<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科学计算器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .calculator {
            background: #16213e;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 400px;
        }
        .display {
            background: #0f3460;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
        }
        .expression {
            color: #888;
            font-size: 14px;
            min-height: 20px;
            margin-bottom: 5px;
            word-break: break-all;
        }
        .result {
            color: #fff;
            font-size: 36px;
            font-weight: 300;
            word-break: break-all;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 16px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: #1f4068;
            color: #fff;
        }
        button:active { transform: scale(0.95); }
        button:hover { background: #2a5285; }
        .operator { background: #e94560; }
        .operator:hover { background: #ff6b6b; }
        .function { background: #4a6fa5; font-size: 14px; }
        .function:hover { background: #5a8fc5; }
        .clear { background: #c44569; }
        .clear:hover { background: #d45579; }
        .equals { background: #00d9ff; color: #1a1a2e; }
        .equals:hover { background: #33e1ff; }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="function" onclick="addFunc('Math.sin')">sin</button>
            <button class="function" onclick="addFunc('Math.cos')">cos</button>
            <button class="function" onclick="addFunc('Math.tan')">tan</button>
            <button class="function" onclick="addFunc('Math.log10')">log</button>
            
            <button class="function" onclick="addFunc('Math.asin')">sin⁻¹</button>
            <button class="function" onclick="addFunc('Math.acos')">cos⁻¹</button>
            <button class="function" onclick="addFunc('Math.atan')">tan⁻¹</button>
            <button class="function" onclick="addFunc('Math.sqrt')">√</button>
            
            <button class="function" onclick="addFunc('Math.PI')">π</button>
            <button class="function" onclick="addFunc('Math.E')">e</button>
            <button class="function" onclick="addOp('**')">x^y</button>
            <button class="function" onclick="addFunc('factorial')">n!</button>
            
            <button class="clear" onclick="clearAll()">C</button>
            <button class="clear" onclick="backspace()">⌫</button>
            <button class="operator" onclick="addOp('%')">%</button>
            <button class="operator" onclick="addOp('/')">÷</button>
            
            <button onclick="addNum('7')">7</button>
            <button onclick="addNum('8')">8</button>
            <button onclick="addNum('9')">9</button>
            <button class="operator" onclick="addOp('*')">×</button>
            
            <button onclick="addNum('4')">4</button>
            <button onclick="addNum('5')">5</button>
            <button onclick="addNum('6')">6</button>
            <button class="operator" onclick="addOp('-')">−</button>
            
            <button onclick="addNum('1')">1</button>
            <button onclick="addNum('2')">2</button>
            <button onclick="addNum('3')">3</button>
            <button class="operator" onclick="addOp('+')">+</button>
            
            <button onclick="addNum('0')" style="grid-column: span 2">0</button>
            <button onclick="addNum('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let expression = '';
        
        // 添加数字
        function addNum(val) {
            // 如果当前是错误状态，清空
            if (document.getElementById('result').textContent === 'Error') {
                clearAll();
            }
            expression += val;
            updateDisplay();
        }
        
        // 添加运算符
        function addOp(val) {
            if (expression === '' && val !== '-') return;
            
            // 如果当前是错误状态，先清空
            if (document.getElementById('result').textContent === 'Error') {
                clearAll();
                return;
            }
            
            // 避免连续输入运算符
            const lastChar = expression.slice(-1);
            if (['+', '-', '*', '/', '%', '**'].includes(lastChar)) {
                expression = expression.slice(0, -1);
            }
            
            // 替换显示符号
            const opMap = {'*': '×', '/': '÷', '-': '−'};
            expression += opMap[val] || val;
            updateDisplay();
        }
        
        // 添加函数（自动加右括号）
        function addFunc(val) {
            // 如果当前是错误状态，清空
            if (document.getElementById('result').textContent === 'Error') {
                clearAll();
            }
            
            if (val === 'factorial') {
                expression += 'factorial(';
            } else {
                expression += val + '(';
            }
            updateDisplay();
        }
        
        // 阶乘函数
        function factorial(n) {
            n = Math.round(n);
            if (n < 0) return NaN;
            if (n === 0 || n === 1) return 1;
            let result = 1;
            for (let i = 2; i <= n; i++) result *= i;
            return result;
        }
        
        // 计算
        function calculate() {
            if (expression === '') return;
            
            try {
                // 替换显示符号为计算符号
                let expr = expression
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/−/g, '-');
                
                // 替换阶乘函数
                // factorial(x) 需要计算后再应用阶乘
                // 先计算表达式，然后对结果应用阶乘（如果有的话）
                
                // 简单处理：如果表达式以 factorial( 开头，提取数字并计算阶乘
                if (expr.startsWith('factorial(')) {
                    let match = expr.match(/factorial\((\d+)\)/);
                    if (match) {
                        let result = factorial(parseInt(match[1]));
                        document.getElementById('result').textContent = result;
                        expression = String(result);
                        document.getElementById('expression').textContent = expression;
                        return;
                    }
                }
                
                let result = eval(expr);
                
                if (typeof result === 'function') {
                    result = 0;
                }
                
                document.getElementById('result').textContent = isFinite(result) ? result : 'Error';
                expression = String(document.getElementById('result').textContent);
                document.getElementById('expression').textContent = '';
            } catch (e) {
                document.getElementById('result').textContent = 'Error';
            }
        }
        
        // 清空
        function clearAll() {
            expression = '';
            document.getElementById('result').textContent = '0';
            document.getElementById('expression').textContent = '';
        }
        
        // 退格
        function backspace() {
            if (document.getElementById('result').textContent === 'Error') {
                clearAll();
                return;
            }
            expression = expression.slice(0, -1);
            updateDisplay();
        }
        
        // 更新显示
        function updateDisplay() {
            let display = expression
                .replace(/Math\./g, '')
                .replace(/PI/g, 'π')
                .replace(/E/g, 'e')
                .replace(/factorial/g, 'n!');
            
            document.getElementById('expression').textContent = display;
            document.getElementById('result').textContent = expression || '0';
        }
    </script>
</body>
</html>
