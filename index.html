<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科学计算器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .calculator {
            background: #16213e;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 400px;
        }
        .display {
            background: #0f3460;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
        }
        .expression {
            color: #888;
            font-size: 14px;
            min-height: 20px;
            margin-bottom: 5px;
            word-break: break-all;
        }
        .result {
            color: #fff;
            font-size: 36px;
            font-weight: 300;
            word-break: break-all;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 16px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: #1f4068;
            color: #fff;
        }
        button:active { transform: scale(0.95); }
        button:hover { background: #2a5285; }
        .operator { background: #e94560; }
        .operator:hover { background: #ff6b6b; }
        .function { background: #4a6fa5; font-size: 14px; }
        .function:hover { background: #5a8fc5; }
        .constant { background: #2d5a7b; }
        .constant:hover { background: #3d7a9b; }
        .clear { background: #c44569; }
        .clear:hover { background: #d45579; }
        .equals { background: #00d9ff; color: #1a1a2e; }
        .equals:hover { background: #33e1ff; }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="function" onclick="addFunc('Math.sin')">sin</button>
            <button class="function" onclick="addFunc('Math.cos')">cos</button>
            <button class="function" onclick="addFunc('Math.tan')">tan</button>
            <button class="function" onclick="addFunc('Math.log10')">log</button>
            
            <button class="function" onclick="addFunc('Math.asin')">sin⁻¹</button>
            <button class="function" onclick="addFunc('Math.acos')">cos⁻¹</button>
            <button class="function" onclick="addFunc('Math.atan')">tan⁻¹</button>
            <button class="function" onclick="addFunc('Math.sqrt')">√</button>
            
            <button class="constant" onclick="addConstant('Math.PI')">π</button>
            <button class="constant" onclick="addConstant('Math.E')">e</button>
            <button class="function" onclick="addOp('**')">x^y</button>
            <button class="function" onclick="addRightParen()">)</button>
            
            <button class="clear" onclick="clearAll()">C</button>
            <button class="clear" onclick="backspace()">⌫</button>
            <button class="operator" onclick="addOp('%')">%</button>
            <button class="operator" onclick="addOp('/')">÷</button>
            
            <button onclick="addNum('7')">7</button>
            <button onclick="addNum('8')">8</button>
            <button onclick="addNum('9')">9</button>
            <button class="operator" onclick="addOp('*')">×</button>
            
            <button onclick="addNum('4')">4</button>
            <button onclick="addNum('5')">5</button>
            <button onclick="addNum('6')">6</button>
            <button class="operator" onclick="addOp('-')">−</button>
            
            <button onclick="addNum('1')">1</button>
            <button onclick="addNum('2')">2</button>
            <button onclick="addNum('3')">3</button>
            <button class="operator" onclick="addOp('+')">+</button>
            
            <button onclick="addNum('(')">(</button>
            <button onclick="addNum('0')">0</button>
            <button onclick="addNum('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let expression = '';
        
        // 添加数字或括号
        function addNum(val) {
            if (document.getElementById('result').textContent === 'Error') {
                clearAll();
            }
            expression += val;
            updateDisplay();
        }
        
        // 添加运算符
        function addOp(val) {
            if (expression === '' && val !== '-') return;
            
            if (document.getElementById('result').textContent === 'Error') {
                clearAll();
                return;
            }
            
            // 避免连续输入运算符
            const lastChar = expression.slice(-1);
            if (['+', '-', '*', '/', '%', '**'].includes(lastChar)) {
                expression = expression.slice(0, -1);
            }
            
            const opMap = {'*': '×', '/': '÷', '-': '−'};
            expression += opMap[val] || val;
            updateDisplay();
        }
        
        // 添加函数（加左括号）
        function addFunc(val) {
            if (document.getElementById('result').textContent === 'Error') {
                clearAll();
            }
            expression += val + '(';
            updateDisplay();
        }
        
        // 添加常量（π 和 e）
        function addConstant(val) {
            if (document.getElementById('result').textContent === 'Error') {
                clearAll();
            }
            expression += val;
            updateDisplay();
        }
        
        // 添加右括号
        function addRightParen() {
            if (document.getElementById('result').textContent === 'Error') {
                clearAll();
                return;
            }
            // 统计左括号和右括号数量，避免过多右括号
            const leftCount = (expression.match(/\(/g) || []).length;
            const rightCount = (expression.match(/\)/g) || []).length;
            
            if (leftCount > rightCount) {
                expression += ')';
                updateDisplay();
            }
        }
        
        // 阶乘函数
        function factorial(n) {
            n = Math.round(n);
            if (n < 0) return NaN;
            if (n > 170) return Infinity; // 超出 JavaScript 范围
            if (n === 0 || n === 1) return 1;
            let result = 1;
            for (let i = 2; i <= n; i++) result *= i;
            return result;
        }
        
        // 计算
        function calculate() {
            if (expression === '') return;
            
            try {
                let expr = expression
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/−/g, '-');
                
                // 处理阶乘 - 替换 n! 为 factorial(n)
                // 从左到右处理每个阶乘
                while (expr.includes('!')) {
                    // 找到阶乘运算符前的数字
                    let match = expr.match(/(\d+(\.\d+)?)\s*!/);
                    if (match) {
                        let num = parseFloat(match[1]);
                        let fact = factorial(num);
                        expr = expr.replace(match[0], String(fact));
                    } else {
                        break;
                    }
                }
                
                // 移除可能多余的开括号（如果有未匹配的）
                // 先尝试计算
                let result = eval(expr);
                
                if (typeof result === 'function') {
                    result = 0;
                }
                
                if (!isFinite(result)) {
                    document.getElementById('result').textContent = 'Error';
                } else {
                    // 四舍五入避免浮点误差
                    if (Number.isInteger(result)) {
                        document.getElementById('result').textContent = result;
                    } else {
                        // 保留10位小数，去除尾随0
                        result = parseFloat(result.toPrecision(10));
                        document.getElementById('result').textContent = result;
                    }
                    // 保存结果到 expression 以便连续计算
                    expression = String(result);
                    document.getElementById('expression').textContent = '';
                }
            } catch (e) {
                document.getElementById('result').textContent = 'Error';
            }
        }
        
        // 清空
        function clearAll() {
            expression = '';
            document.getElementById('result').textContent = '0';
            document.getElementById('expression').textContent = '';
        }
        
        // 退格
        function backspace() {
            if (document.getElementById('result').textContent === 'Error') {
                clearAll();
                return;
            }
            expression = expression.slice(0, -1);
            updateDisplay();
        }
        
        // 更新显示
        function updateDisplay() {
            let display = expression
                .replace(/Math\./g, '')
                .replace(/PI/g, 'π')
                .replace(/E/g, 'e');
            
            document.getElementById('expression').textContent = display;
            document.getElementById('result').textContent = expression || '0';
        }
    </script>
</body>
</html>
